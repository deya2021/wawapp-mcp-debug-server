# Firestore Index Missing Scenario
# Simulates failure when composite index is not created

scenarioId: FAIL-001
category: FAILURE
title: "Firestore composite index missing for nearby orders query"

description: |
  Detects when Firestore composite index is missing for nearby orders query.
  This causes queries with multiple fields (status, createdAt) to fail.

  Typical error: "The query requires an index. You can create it here: https://console.firebase.google.com/..."

inputs:
  driverId:
    type: string
    required: true
    description: "Driver UID for query simulation"
  radiusKm:
    type: number
    required: false
    description: "Search radius in km (default: 6.0)"
  limit:
    type: number
    required: false
    description: "Query limit (optional)"

checks:
  # Check 1: Driver location exists
  - atom: driver_location_freshness
    params:
      driverId: "$inputs.driverId"
      maxAgeMinutes: 60
    successCriteria:
      - LOCATION_EXISTS

  # Check 2: Simulate nearby orders query
  - atom: nearby_orders_query_simulator
    params:
      driverId: "$inputs.driverId"
      radiusKm: 6.0
      limit: "$inputs.limit"
    successCriteria:
      - NO_INDEX_ERRORS
      - QUERY_BOUNDED

successMarkers:
  - "Query executes successfully"
  - "No index errors detected"

failureMappings:
  FIRESTORE_INDEX_MISSING: FAIL-001
  QUERY_UNBOUNDED:NO_LIMIT: FAIL-002
  LOCATION_MISSING: FAIL-009
